<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grumpy's Beers On Tap</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050505;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }

  .screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 82% 48%, rgba(255, 132, 27, 0.24), transparent 34%),
      radial-gradient(circle at 22% 24%, rgba(255, 255, 255, 0.08), transparent 28%),
      linear-gradient(135deg, #030303 0%, #14100c 48%, #040404 100%);
  }

  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.05) 42%, transparent 72%);
    animation: softSweep 15s linear infinite;
    opacity: 0.42;
    pointer-events: none;
  }

  @keyframes softSweep {
    0% { transform: translateX(-48%) skewX(-15deg); }
    100% { transform: translateX(48%) skewX(-15deg); }
  }

  .header {
    position: absolute;
    top: 38px;
    left: 70px;
    right: 70px;
    height: 150px;
    display: flex;
    align-items: center;
    z-index: 8;
  }

  .grumpy-logo {
    width: 170px;
    height: 170px;
    object-fit: contain;
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.9));
  }

  .title-wrap {
    margin-left: 48px;
  }

  .title {
    font-size: 94px;
    font-weight: 950;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow:
      0 6px 0 #000,
      0 0 28px rgba(255, 196, 99, 0.48);
  }

  .subtitle {
    margin-top: 4px;
    font-size: 31px;
    font-weight: 800;
    color: #ffd58a;
    letter-spacing: 1px;
    text-shadow: 0 3px 8px #000;
  }

  .tap-panel {
    position: absolute;
    left: 58px;
    top: 215px;
    width: 1325px;
    height: 735px;
    padding: 28px 36px;
    border-radius: 34px;
    background: rgba(0, 0, 0, 0.24);
    border: 2px solid rgba(255, 206, 128, 0.20);
    box-shadow:
      inset 0 0 70px rgba(255,255,255,0.03),
      0 25px 70px rgba(0,0,0,0.55);
    z-index: 5;
  }

  .beer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px 34px;
    height: 100%;
    align-items: center;
  }

  .beer-logo {
    height: 205px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    background:
      radial-gradient(circle at 50% 45%, rgba(255,255,255,0.09), transparent 55%),
      rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .beer-logo img {
    max-width: 108%;
    max-height: 198px;
    object-fit: contain;
    filter:
      drop-shadow(0 9px 10px rgba(0,0,0,0.85))
      drop-shadow(0 0 7px rgba(255,255,255,0.10));
  }

  .tap-scene {
    position: absolute;
    right: 12px;
    top: 150px;
    width: 535px;
    height: 810px;
    z-index: 3;
    opacity: 0.92;
  }

  .tap-backplate {
    position: absolute;
    top: 42px;
    right: 128px;
    width: 230px;
    height: 88px;
    border-radius: 22px;
    background:
      linear-gradient(180deg, #eeeeee 0%, #888 50%, #3d3d3d 100%);
    box-shadow:
      inset 0 0 18px rgba(255,255,255,0.45),
      0 15px 35px rgba(0,0,0,0.75);
  }

  .tap-handle {
    position: absolute;
    top: 0;
    right: 202px;
    width: 78px;
    height: 255px;
    transform-origin: 50% 28px;
    transform: rotate(12deg);
    animation: handlePull 9s ease-in-out infinite;
    z-index: 7;
  }

  .handle-top {
    width: 78px;
    height: 92px;
    border-radius: 20px 20px 14px 14px;
    background:
      linear-gradient(180deg, #f5f5f5 0%, #c9c9c9 42%, #535353 100%);
    border: 3px solid rgba(255,255,255,0.28);
    box-shadow:
      inset 0 0 12px rgba(255,255,255,0.55),
      0 12px 22px rgba(0,0,0,0.65);
  }

  .handle-stick {
    margin: -2px auto 0;
    width: 30px;
    height: 165px;
    border-radius: 16px;
    background:
      linear-gradient(90deg, #6a360b, #d48a29, #6a360b);
    box-shadow:
      inset 0 0 8px rgba(255,255,255,0.3),
      0 10px 22px rgba(0,0,0,0.55);
  }

  @keyframes handlePull {
    0%, 18% { transform: rotate(0deg); }
    28%, 78% { transform: rotate(15deg); }
    88%, 100% { transform: rotate(0deg); }
  }

  .hand {
    position: absolute;
    top: 130px;
    right: 115px;
    width: 230px;
    height: 150px;
    z-index: 8;
    transform: rotate(9deg);
    animation: handPull 9s ease-in-out infinite;
  }

  @keyframes handPull {
    0%, 18% { transform: translateY(-12px) rotate(0deg); opacity: 0.92; }
    28%, 78% { transform: translateY(14px) rotate(9deg); opacity: 1; }
    88%, 100% { transform: translateY(-12px) rotate(0deg); opacity: 0.92; }
  }

  .palm {
    position: absolute;
    top: 38px;
    right: 35px;
    width: 125px;
    height: 82px;
    border-radius: 42px 35px 38px 38px;
    background:
      radial-gradient(circle at 35% 32%, rgba(255,255,255,0.30), transparent 28%),
      linear-gradient(145deg, #f0b982, #bf7445 70%, #8f4f32);
    box-shadow:
      inset -8px -10px 14px rgba(80,25,5,0.22),
      0 10px 22px rgba(0,0,0,0.45);
  }

  .thumb {
    position: absolute;
    top: 80px;
    right: 128px;
    width: 70px;
    height: 38px;
    border-radius: 30px;
    background: linear-gradient(145deg, #e7aa74, #a85f38);
    transform: rotate(-20deg);
    box-shadow: 0 8px 14px rgba(0,0,0,0.35);
  }

  .finger {
    position: absolute;
    width: 36px;
    height: 92px;
    border-radius: 20px;
    background: linear-gradient(180deg, #f0b982, #b96e42);
    box-shadow: inset -5px -8px 10px rgba(80,25,5,0.18), 0 7px 12px rgba(0,0,0,0.35);
  }

  .finger.one { top: 10px; right: 120px; transform: rotate(9deg); }
  .finger.two { top: 8px; right: 88px; height: 104px; transform: rotate(4deg); }
  .finger.three { top: 13px; right: 57px; height: 96px; transform: rotate(-3deg); }
  .finger.four { top: 24px; right: 28px; height: 78px; transform: rotate(-10deg); }

  .spout {
    position: absolute;
    top: 128px;
    right: 225px;
    width: 48px;
    height: 62px;
    background:
      linear-gradient(180deg, #cfcfcf, #5d5d5d);
    border-radius: 0 0 14px 14px;
    box-shadow:
      inset 0 0 10px rgba(255,255,255,0.28),
      0 8px 18px rgba(0,0,0,0.65);
    z-index: 6;
  }

  .beer-stream {
    position: absolute;
    top: 184px;
    right: 237px;
    width: 24px;
    height: 325px;
    background: linear-gradient(180deg, #ffe7a1, #f7ad2d 60%, #d37609);
    border-radius: 18px;
    box-shadow: 0 0 18px rgba(255, 170, 45, 0.55);
    animation: streamOn 9s ease-in-out infinite;
    z-index: 4;
  }

  @keyframes streamOn {
    0%, 20% { height: 0; opacity: 0; }
    28%, 78% { height: 325px; opacity: 1; }
    88%, 100% { height: 0; opacity: 0; }
  }

  .glass {
    position: absolute;
    bottom: 0;
    right: 72px;
    width: 355px;
    height: 480px;
    border: 13px solid rgba(255,255,255,0.58);
    border-top: 9px solid rgba(255,255,255,0.78);
    border-radius: 28px 28px 66px 66px;
    overflow: hidden;
    background:
      linear-gradient(90deg, rgba(255,255,255,0.17), rgba(255,255,255,0.04), rgba(255,255,255,0.13));
    box-shadow:
      inset 0 0 42px rgba(255,255,255,0.15),
      0 0 52px rgba(255, 162, 35, 0.23);
    z-index: 3;
  }

  .beer-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background:
      radial-gradient(circle at 28% 34%, rgba(255,255,255,0.24), transparent 8%),
      linear-gradient(180deg, #ffc961 0%, #ee971b 50%, #bd6105 100%);
    animation: fillBeer 9s ease-in-out infinite;
  }

  @keyframes fillBeer {
    0%, 20% { height: 20%; }
    78%, 100% { height: 73%; }
  }

  .foam {
    position: absolute;
    left: -8%;
    width: 116%;
    height: 72px;
    background:
      radial-gradient(circle at 10% 58%, #fff 0 20px, transparent 21px),
      radial-gradient(circle at 27% 43%, #fff 0 24px, transparent 25px),
      radial-gradient(circle at 44% 57%, #fff 0 21px, transparent 22px),
      radial-gradient(circle at 61% 44%, #fff 0 28px, transparent 29px),
      radial-gradient(circle at 80% 58%, #fff 0 22px, transparent 23px),
      radial-gradient(circle at 95% 49%, #fff 0 18px, transparent 19px);
    opacity: 0.92;
    animation: foamRise 9s ease-in-out infinite;
  }

  @keyframes foamRise {
    0%, 20% { bottom: 18%; opacity: 0.35; }
    78%, 100% { bottom: 71%; opacity: 0.92; }
  }

  .glass-logo {
    position: absolute;
    left: 50%;
    top: 48%;
    width: 155px;
    height: 155px;
    object-fit: contain;
    transform: translate(-50%, -50%);
    opacity: 0.58;
    filter:
      drop-shadow(0 4px 6px rgba(0,0,0,0.55))
      grayscale(0.15);
    z-index: 5;
    pointer-events: none;
  }

  .bubble {
    position: absolute;
    bottom: 30px;
    width: 11px;
    height: 11px;
    border: 2px solid rgba(255,255,255,0.50);
    border-radius: 50%;
    animation: bubbleRise 4.8s linear infinite;
    z-index: 4;
  }

  .bubble:nth-child(1) { left: 32%; animation-delay: 0s; }
  .bubble:nth-child(2) { left: 48%; animation-delay: 1.2s; width: 8px; height: 8px; }
  .bubble:nth-child(3) { left: 65%; animation-delay: 2.3s; width: 14px; height: 14px; }
  .bubble:nth-child(4) { left: 42%; animation-delay: 3.4s; width: 7px; height: 7px; }
  .bubble:nth-child(5) { left: 74%; animation-delay: 4.1s; width: 9px; height: 9px; }

  @keyframes bubbleRise {
    0% { transform: translateY(0); opacity: 0; }
    15% { opacity: 0.75; }
    100% { transform: translateY(-330px); opacity: 0; }
  }

  .ticker {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 72px;
    background: rgba(0,0,0,0.88);
    border-top: 2px solid rgba(255, 203, 120, 0.35);
    overflow: hidden;
    z-index: 20;
  }

  .ticker-text {
    position: absolute;
    white-space: nowrap;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 72px;
    color: #ffd58a;
    text-shadow: 0 2px 8px #000;
    animation: tickerMove 30s linear infinite;
    padding-left: 100vw;
  }

  @keyframes tickerMove {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }
</style>
</head>

<body>
  <div class="screen">

    <div class="header">
      <img class="grumpy-logo" src="./grumpys-logo.png" alt="Grumpy's Logo">

      <div class="title-wrap">
        <div class="title">Beers On Tap</div>
        <div class="subtitle">Cold pours, local favorites, and classic bar beers</div>
      </div>
    </div>

    <div class="tap-panel">
      <div class="beer-grid">
        <div class="beer-logo"><img src="./Logos/rush-river.png" alt="Rush River"></div>
        <div class="beer-logo"><img src="./Logos/bemidji.png" alt="Bemidji Brewing"></div>
        <div class="beer-logo"><img src="./Logos/excelsior.png" alt="Excelsior"></div>
        <div class="beer-logo"><img src="./Logos/leinenkugels.png" alt="Leinenkugel's"></div>

        <div class="beer-logo"><img src="./Logos/hazy-little-thing.png" alt="Hazy Little Thing"></div>
        <div class="beer-logo"><img src="./Logos/minnesota-gold.png" alt="Minnesota Gold"></div>
        <div class="beer-logo"><img src="./Logos/coors-light.png" alt="Coors Light"></div>
        <div class="beer-logo"><img src="./Logos/schells.png" alt="Schell's"></div>

        <div class="beer-logo"><img src="./Logos/blue-moon.png" alt="Blue Moon"></div>
        <div class="beer-logo"><img src="./Logos/miller-lite.png" alt="Miller Lite"></div>
        <div class="beer-logo"><img src="./Logos/castle-danger.png" alt="Castle Danger"></div>
        <div class="beer-logo"><img src="./Logos/surly.png" alt="Surly"></div>
      </div>
    </div>

    <div class="tap-scene">
      <div class="tap-backplate"></div>

      <div class="tap-handle">
        <div class="handle-top"></div>
        <div class="handle-stick"></div>
      </div>

      <div class="hand">
        <div class="finger one"></div>
        <div class="finger two"></div>
        <div class="finger three"></div>
        <div class="finger four"></div>
        <div class="palm"></div>
        <div class="thumb"></div>
      </div>

      <div class="spout"></div>
      <div class="beer-stream"></div>

      <div class="glass">
        <div class="beer-fill"></div>
        <div class="foam"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <img class="glass-logo" src="./grumpys-logo.png" alt="Grumpy's Logo">
      </div>
    </div>

    <div class="ticker">
      <div class="ticker-text">
        Now pouring at Grumpy's on Main • Ask your bartender what's new on tap • Try a local Minnesota beer today •
      </div>
    </div>

  </div>
</body>
</html>
