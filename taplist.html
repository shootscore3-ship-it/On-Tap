<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grumpy's Beers On Tap</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050505;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }

  .screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 82% 53%, rgba(255, 153, 35, 0.28), transparent 33%),
      radial-gradient(circle at 22% 22%, rgba(255, 255, 255, 0.08), transparent 28%),
      linear-gradient(135deg, #050505 0%, #12100d 48%, #050505 100%);
  }

  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.055) 40%, transparent 70%);
    animation: softSweep 14s linear infinite;
    opacity: 0.45;
    pointer-events: none;
  }

  @keyframes softSweep {
    0% { transform: translateX(-45%) skewX(-15deg); }
    100% { transform: translateX(45%) skewX(-15deg); }
  }

  .header {
    position: absolute;
    top: 42px;
    left: 70px;
    right: 70px;
    height: 150px;
    display: flex;
    align-items: center;
    z-index: 5;
  }

  .grumpy-logo {
    width: 165px;
    height: 165px;
    object-fit: contain;
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.85));
  }

  .title-wrap {
    margin-left: 48px;
  }

  .title {
    font-size: 92px;
    font-weight: 950;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow:
      0 6px 0 #000,
      0 0 26px rgba(255, 196, 99, 0.45);
  }

  .subtitle {
    margin-top: 4px;
    font-size: 31px;
    font-weight: 800;
    color: #ffd58a;
    letter-spacing: 1px;
    text-shadow: 0 3px 8px #000;
  }

  .tap-panel {
    position: absolute;
    left: 60px;
    top: 220px;
    width: 1320px;
    height: 735px;
    padding: 35px 42px;
    border-radius: 34px;
    background: rgba(0, 0, 0, 0.30);
    border: 2px solid rgba(255, 206, 128, 0.22);
    box-shadow:
      inset 0 0 70px rgba(255,255,255,0.035),
      0 25px 70px rgba(0,0,0,0.55);
    z-index: 4;
  }

  .beer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 30px 45px;
    height: 100%;
    align-items: center;
  }

  .beer-logo {
    height: 190px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .beer-logo img {
    max-width: 100%;
    max-height: 180px;
    object-fit: contain;
    filter:
      drop-shadow(0 8px 9px rgba(0,0,0,0.75))
      drop-shadow(0 0 8px rgba(255,255,255,0.08));
  }

  .glass-area {
    position: absolute;
    right: 35px;
    top: 190px;
    width: 505px;
    height: 760px;
    z-index: 2;
    opacity: 0.88;
  }

  .tap {
    position: absolute;
    top: 10px;
    left: 180px;
    width: 165px;
    height: 88px;
    background:
      linear-gradient(180deg, #f1f1f1 0%, #999 48%, #4e4e4e 100%);
    border-radius: 20px 20px 10px 10px;
    box-shadow:
      inset 0 0 17px rgba(255,255,255,0.45),
      0 14px 28px rgba(0,0,0,0.7);
  }

  .tap::after {
    content: "";
    position: absolute;
    bottom: -47px;
    left: 62px;
    width: 42px;
    height: 52px;
    background: linear-gradient(180deg, #cfcfcf, #5d5d5d);
    border-radius: 0 0 13px 13px;
  }

  .beer-stream {
    position: absolute;
    top: 130px;
    left: 250px;
    width: 22px;
    height: 305px;
    background: linear-gradient(180deg, #ffe08a, #f2a72a 60%, #d77908);
    border-radius: 18px;
    box-shadow: 0 0 18px rgba(255, 170, 45, 0.55);
    animation: streamPulse 1.15s ease-in-out infinite;
  }

  @keyframes streamPulse {
    0%, 100% { transform: scaleX(0.82); opacity: 0.78; }
    50% { transform: scaleX(1.08); opacity: 1; }
  }

  .glass {
    position: absolute;
    bottom: 0;
    left: 82px;
    width: 350px;
    height: 490px;
    border: 13px solid rgba(255,255,255,0.60);
    border-top: 9px solid rgba(255,255,255,0.78);
    border-radius: 26px 26px 64px 64px;
    overflow: hidden;
    background:
      linear-gradient(90deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04), rgba(255,255,255,0.13));
    box-shadow:
      inset 0 0 42px rgba(255,255,255,0.16),
      0 0 45px rgba(255, 162, 35, 0.26);
  }

  .beer-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background:
      radial-gradient(circle at 28% 34%, rgba(255,255,255,0.26), transparent 8%),
      linear-gradient(180deg, #ffc85f 0%, #ee971b 50%, #bf6105 100%);
    animation: fillBeer 26s linear infinite;
  }

  @keyframes fillBeer {
    0% { height: 10%; }
    70% { height: 74%; }
    100% { height: 74%; }
  }

  .foam {
    position: absolute;
    left: -8%;
    width: 116%;
    height: 72px;
    background:
      radial-gradient(circle at 10% 58%, #fff 0 20px, transparent 21px),
      radial-gradient(circle at 27% 43%, #fff 0 24px, transparent 25px),
      radial-gradient(circle at 44% 57%, #fff 0 21px, transparent 22px),
      radial-gradient(circle at 61% 44%, #fff 0 28px, transparent 29px),
      radial-gradient(circle at 80% 58%, #fff 0 22px, transparent 23px),
      radial-gradient(circle at 95% 49%, #fff 0 18px, transparent 19px);
    opacity: 0.92;
    animation: foamRise 26s linear infinite;
  }

  @keyframes foamRise {
    0% { bottom: 8%; opacity: 0.35; }
    70% { bottom: 72%; opacity: 0.92; }
    100% { bottom: 72%; opacity: 0.92; }
  }

  .bubble {
    position: absolute;
    bottom: 30px;
    width: 11px;
    height: 11px;
    border: 2px solid rgba(255,255,255,0.52);
    border-radius: 50%;
    animation: bubbleRise 5.5s linear infinite;
  }

  .bubble:nth-child(1) { left: 32%; animation-delay: 0s; }
  .bubble:nth-child(2) { left: 48%; animation-delay: 1.2s; width: 8px; height: 8px; }
  .bubble:nth-child(3) { left: 65%; animation-delay: 2.3s; width: 14px; height: 14px; }
  .bubble:nth-child(4) { left: 42%; animation-delay: 3.4s; width: 7px; height: 7px; }
  .bubble:nth-child(5) { left: 74%; animation-delay: 4.1s; width: 9px; height: 9px; }

  @keyframes bubbleRise {
    0% { transform: translateY(0); opacity: 0; }
    15% { opacity: 0.75; }
    100% { transform: translateY(-340px); opacity: 0; }
  }

  .ticker {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 72px;
    background: rgba(0,0,0,0.86);
    border-top: 2px solid rgba(255, 203, 120, 0.35);
    overflow: hidden;
    z-index: 10;
  }

  .ticker-text {
    position: absolute;
    white-space: nowrap;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 72px;
    color: #ffd58a;
    text-shadow: 0 2px 8px #000;
    animation: tickerMove 30s linear infinite;
    padding-left: 100vw;
  }

  @keyframes tickerMove {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }
</style>
</head>

<body>
  <div class="screen">

    <div class="header">
      <img class="grumpy-logo" src="./grumpys-logo.png" alt="Grumpy's Logo">

      <div class="title-wrap">
        <div class="title">Beers On Tap</div>
        <div class="subtitle">Cold pours, local favorites, and classic bar beers</div>
      </div>
    </div>

    <div class="tap-panel">
      <div class="beer-grid">
        <div class="beer-logo"><img src="./Logos/rush-river.png" alt="Rush River"></div>
        <div class="beer-logo"><img src="./Logos/bemidji.png" alt="Bemidji Brewing"></div>
        <div class="beer-logo"><img src="./Logos/excelsior.png" alt="Excelsior"></div>
        <div class="beer-logo"><img src="./Logos/leinenkugels.png" alt="Leinenkugel's"></div>

        <div class="beer-logo"><img src="./Logos/hazy-little-thing.png" alt="Hazy Little Thing"></div>
        <div class="beer-logo"><img src="./Logos/minnesota-gold.png" alt="Minnesota Gold"></div>
        <div class="beer-logo"><img src="./Logos/coors-light.png" alt="Coors Light"></div>
        <div class="beer-logo"><img src="./Logos/schells.png" alt="Schell's"></div>

        <div class="beer-logo"><img src="./Logos/blue-moon.png" alt="Blue Moon"></div>
        <div class="beer-logo"><img src="./Logos/miller-lite.png" alt="Miller Lite"></div>
        <div class="beer-logo"><img src="./Logos/castle-danger.png" alt="Castle Danger"></div>
        <div class="beer-logo"><img src="./Logos/surly.png" alt="Surly"></div>
      </div>
    </div>

    <div class="glass-area">
      <div class="tap"></div>
      <div class="beer-stream"></div>

      <div class="glass">
        <div class="beer-fill"></div>
        <div class="foam"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
      </div>
    </div>

    <div class="ticker">
      <div class="ticker-text">
        Now pouring at Grumpy's on Main • Ask your bartender what's new on tap • Try a local Minnesota beer today •
      </div>
    </div>

  </div>
</body>
</html>
