<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grumpy's Beers On Tap</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #070707;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }

  .screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 78% 50%, rgba(255, 169, 64, 0.25), transparent 30%),
      radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 22%),
      linear-gradient(135deg, #060606 0%, #14100b 45%, #080808 100%);
  }

  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(120deg, rgba(255,255,255,0.04) 0%, transparent 35%, rgba(255,255,255,0.025) 60%, transparent 100%);
    animation: lightSweep 12s linear infinite;
    opacity: 0.75;
    pointer-events: none;
  }

  @keyframes lightSweep {
    0% { transform: translateX(-30%) skewX(-12deg); }
    100% { transform: translateX(30%) skewX(-12deg); }
  }

  .header {
    position: absolute;
    top: 45px;
    left: 60px;
    right: 60px;
    height: 150px;
    display: flex;
    align-items: center;
    z-index: 5;
  }

  .grumpy-logo {
    width: 150px;
    height: 150px;
    object-fit: contain;
    filter: drop-shadow(0 0 12px rgba(0,0,0,0.8));
  }

  .title-wrap {
    margin-left: 45px;
  }

  .title {
    font-size: 88px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow:
      0 5px 0 #000,
      0 0 20px rgba(255, 190, 90, 0.45);
  }

  .subtitle {
    margin-top: 5px;
    font-size: 30px;
    font-weight: 800;
    color: #ffd58a;
    letter-spacing: 1px;
    text-shadow: 0 3px 8px #000;
  }

  .tap-panel {
    position: absolute;
    left: 55px;
    top: 230px;
    width: 1260px;
    height: 720px;
    padding: 32px;
    border-radius: 34px;
    background: rgba(0, 0, 0, 0.42);
    border: 2px solid rgba(255, 210, 130, 0.25);
    box-shadow:
      inset 0 0 60px rgba(255,255,255,0.035),
      0 25px 60px rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
    z-index: 4;
  }

  .beer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px 28px;
    height: 100%;
    align-items: center;
  }

  .beer-card {
    height: 200px;
    border-radius: 26px;
    background:
      radial-gradient(circle at 50% 35%, rgba(255,255,255,0.12), transparent 45%),
      rgba(255,255,255,0.055);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  }

  .beer-card img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 10px 12px rgba(0,0,0,0.55));
  }

  .glass-area {
    position: absolute;
    right: 50px;
    top: 220px;
    width: 500px;
    height: 720px;
    z-index: 2;
  }

  .tap {
    position: absolute;
    top: 0;
    left: 185px;
    width: 155px;
    height: 85px;
    background: linear-gradient(180deg, #c9c9c9, #5d5d5d);
    border-radius: 18px 18px 8px 8px;
    box-shadow: inset 0 0 15px rgba(255,255,255,0.35), 0 12px 25px rgba(0,0,0,0.6);
  }

  .tap::after {
    content: "";
    position: absolute;
    bottom: -42px;
    left: 58px;
    width: 40px;
    height: 48px;
    background: linear-gradient(180deg, #a9a9a9, #555);
    border-radius: 0 0 12px 12px;
  }

  .beer-stream {
    position: absolute;
    top: 120px;
    left: 246px;
    width: 22px;
    height: 270px;
    background: linear-gradient(180deg, rgba(255,213,104,0.95), rgba(232,143,22,0.9));
    border-radius: 14px;
    filter: blur(0.3px);
    opacity: 0.9;
    animation: streamPulse 1.2s ease-in-out infinite;
  }

  @keyframes streamPulse {
    0%, 100% { transform: scaleX(0.85); opacity: 0.75; }
    50% { transform: scaleX(1.15); opacity: 1; }
  }

  .glass {
    position: absolute;
    bottom: 0;
    left: 110px;
    width: 300px;
    height: 460px;
    border: 12px solid rgba(255,255,255,0.55);
    border-top: 8px solid rgba(255,255,255,0.7);
    border-radius: 24px 24px 55px 55px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    box-shadow:
      inset 0 0 35px rgba(255,255,255,0.16),
      0 0 35px rgba(255, 167, 45, 0.2);
  }

  .beer-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 75%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), transparent 7%),
      linear-gradient(180deg, #f8c15a 0%, #d88917 55%, #a95708 100%);
    animation: fillBeer 28s linear infinite;
  }

  @keyframes fillBeer {
    0% { height: 8%; }
    65% { height: 76%; }
    100% { height: 76%; }
  }

  .foam {
    position: absolute;
    left: -10%;
    width: 120%;
    height: 65px;
    bottom: 73%;
    background:
      radial-gradient(circle at 12% 55%, #fff 0 18px, transparent 19px),
      radial-gradient(circle at 28% 45%, #fff 0 22px, transparent 23px),
      radial-gradient(circle at 45% 58%, #fff 0 18px, transparent 19px),
      radial-gradient(circle at 62% 48%, #fff 0 25px, transparent 26px),
      radial-gradient(circle at 82% 55%, #fff 0 20px, transparent 21px);
    opacity: 0.9;
    animation: foamRise 28s linear infinite;
  }

  @keyframes foamRise {
    0% { bottom: 6%; opacity: 0.25; }
    65% { bottom: 73%; opacity: 0.9; }
    100% { bottom: 73%; opacity: 0.9; }
  }

  .bubble {
    position: absolute;
    bottom: 20px;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.55);
    border-radius: 50%;
    animation: bubbleRise 5s linear infinite;
  }

  .bubble:nth-child(1) { left: 35%; animation-delay: 0s; }
  .bubble:nth-child(2) { left: 52%; animation-delay: 1.1s; width: 9px; height: 9px; }
  .bubble:nth-child(3) { left: 68%; animation-delay: 2.4s; width: 14px; height: 14px; }
  .bubble:nth-child(4) { left: 43%; animation-delay: 3.2s; width: 7px; height: 7px; }

  @keyframes bubbleRise {
    0% { transform: translateY(0); opacity: 0; }
    15% { opacity: 0.8; }
    100% { transform: translateY(-330px); opacity: 0; }
  }

  .ticker {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 74px;
    background: rgba(0,0,0,0.78);
    border-top: 2px solid rgba(255, 203, 120, 0.35);
    overflow: hidden;
    z-index: 10;
  }

  .ticker-text {
    position: absolute;
    white-space: nowrap;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 1px;
    line-height: 74px;
    animation: tickerMove 28s linear infinite;
    color: #ffd58a;
    text-shadow: 0 2px 8px #000;
  }

  @keyframes tickerMove {
    from { transform: translateX(100vw); }
    to { transform: translateX(-100%); }
  }
</style>
</head>

<body>
  <div class="screen">

    <div class="header">
      <img class="grumpy-logo" src="grumpys-logo.png" alt="Grumpy's Logo">

      <div class="title-wrap">
        <div class="title">Beers On Tap</div>
        <div class="subtitle">Cold pours, local favorites, and classic bar beers</div>
      </div>
    </div>

    <div class="tap-panel">
      <div class="beer-grid">
        <div class="beer-card"><img src="logos/rush-river.png" alt="Rush River"></div>
        <div class="beer-card"><img src="logos/bemidji.png" alt="Bemidji Brewing"></div>
        <div class="beer-card"><img src="logos/excelsior.png" alt="Excelsior"></div>
        <div class="beer-card"><img src="logos/leinenkugels.png" alt="Leinenkugel's"></div>

        <div class="beer-card"><img src="logos/hazy-little-thing.png" alt="Hazy Little Thing"></div>
        <div class="beer-card"><img src="logos/minnesota-gold.png" alt="Minnesota Gold"></div>
        <div class="beer-card"><img src="logos/coors-light.png" alt="Coors Light"></div>
        <div class="beer-card"><img src="logos/schells.png" alt="Schell's"></div>

        <div class="beer-card"><img src="logos/blue-moon.png" alt="Blue Moon"></div>
        <div class="beer-card"><img src="logos/miller-lite.png" alt="Miller Lite"></div>
        <div class="beer-card"><img src="logos/castle-danger.png" alt="Castle Danger"></div>
        <div class="beer-card"><img src="logos/surly.png" alt="Surly"></div>
      </div>
    </div>

    <div class="glass-area">
      <div class="tap"></div>
      <div class="beer-stream"></div>

      <div class="glass">
        <div class="beer-fill"></div>
        <div class="foam"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
      </div>
    </div>

    <div class="ticker">
      <div class="ticker-text">
        Now pouring at Grumpy's on Main • Ask your bartender what's new on tap • Try a local Minnesota beer today •
      </div>
    </div>

  </div>
</body>
</html>
